name: Auto-label issues by size

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  label-by-size:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label issues by size
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Bestem hvilke issues der skal behandles
            let issuesToProcess = [];
            
            if (context.eventName === 'workflow_dispatch') {
              // Manual trigger: hent alle åbne issues
              console.log('📋 Manual trigger - processing all open issues...');
              const allIssues = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              issuesToProcess = allIssues.data;
            } else if (context.payload.issue) {
              // Issue event: behandl kun det issue
              console.log(`📋 Issue event - processing issue #${context.payload.issue.number}`);
              issuesToProcess = [context.payload.issue];
            } else {
              console.log('⚠️ No issues to process');
              return;
            }
            
            console.log(`Found ${issuesToProcess.length} issue(s) to process`);
            
            // Process each issue
            for (const issue of issuesToProcess) {
              const issueNumber = issue.number;
              console.log(`\n🔍 Processing issue #${issueNumber}...`);
              
              try {
                // Query ProjectsV2 for size
                const query = `query {
                  repository(owner: "${owner}", name: "${repo}") {
                    issue(number: ${issueNumber}) {
                      projectsV2(first: 5) {
                        nodes {
                          items(first: 50) {
                            nodes {
                              fieldValues(first: 20) {
                                nodes {
                                  field { name }
                                  ... on ProjectV2FieldSingleSelectValue { name }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`;
                
                const result = await github.graphql(query);
                let size = null;
                
                if (result.repository.issue.projectsV2.nodes.length > 0) {
                  const items = result.repository.issue.projectsV2.nodes[0].items.nodes;
                  for (const item of items) {
                    for (const fv of item.fieldValues.nodes) {
                      if (fv.field?.name === 'Size') {
                        size = fv.name;
                        break;
                      }
                    }
                    if (size) break;
                  }
                }
                
                if (!size) {
                  console.log('  ⚠️ Size not found in projects');
                  continue;
                }
                
                console.log(`  📏 Size: ${size}`);
                
                const sizeToLabel = {
                  'XS': 'size-xs',
                  'S': 'size-small',
                  'M': 'size-medium',
                  'L': 'size-large',
                  'XL': 'size-xl',
                  'XXL': 'size-xxl'
                };
                
                const label = sizeToLabel[size];
                if (!label) {
                  console.log(`  ❌ Unknown size: ${size}`);
                  continue;
                }
                
                // Get current issue data
                const issueData = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber
                });
                
                const currentLabels = issueData.data.labels.map(l => l.name);
                const hasLabel = currentLabels.includes(label);
                
                if (hasLabel) {
                  console.log(`  ✓ Already has label: ${label}`);
                  continue;
                }
                
                // Remove old size labels and add new one
                const newLabels = currentLabels.filter(l => !l.startsWith('size-'));
                newLabels.push(label);
                
                await github.rest.issues.setLabels({
                  owner, repo, issue_number: issueNumber, labels: newLabels
                });
                
                console.log(`  ✅ Added label: ${label}`);
                
              } catch (e) {
                console.error(`  ❌ Error: ${e.message}`);
              }
            }
            
            console.log('\n✨ Done!');
