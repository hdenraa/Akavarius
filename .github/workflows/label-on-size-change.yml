name: Auto-label issues by size

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to label (optional)'
        required: false

jobs:
  label-by-size:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: read
    steps:
      - name: Get issue size from project and add label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue?.number || context.inputs.issue_number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Processing issue #${issueNumber}`);
            
            if (!issueNumber) {
              console.log('❌ No issue number found');
              return;
            }
            
            let sizeValue = null;
            
            try {
              // Query ProjectsV2 via GraphQL
              const query = `
                query {
                  repository(owner: "${owner}", name: "${repo}") {
                    issue(number: ${issueNumber}) {
                      projectsV2(first: 10) {
                        nodes {
                          title
                          items(first: 100) {
                            nodes {
                              content {
                                ... on Issue {
                                  number
                                }
                              }
                              fieldValues(first: 20) {
                                nodes {
                                  field {
                                    ... on ProjectV2Field {
                                      name
                                    }
                                  }
                                  ... on ProjectV2FieldSingleSelectValue {
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              console.log('🔍 Querying GraphQL...');
              const result = await github.graphql(query);
              
              if (result.repository.issue.projectsV2.nodes.length > 0) {
                console.log(`✅ Found ${result.repository.issue.projectsV2.nodes.length} project(s)`);
                const items = result.repository.issue.projectsV2.nodes[0].items.nodes;
                
                for (const item of items) {
                  if (item.content && item.content.number === issueNumber) {
                    const fieldValues = item.fieldValues.nodes;
                    
                    for (const fieldValue of fieldValues) {
                      if (fieldValue.field && fieldValue.field.name === 'Size') {
                        sizeValue = fieldValue.name;
                        console.log(`📏 Size field value: ${sizeValue}`);
                        break;
                      }
                    }
                  }
                }
              } else {
                console.log('⚠️ Issue not found in any ProjectsV2');
              }
            } catch (error) {
              console.error('❌ GraphQL Error:', error.message);
              return;
            }
            
            // Map T-shirt sizes til labels
            const sizeMap = {
              'XS': 'size-xs',
              'S': 'size-small',
              'M': 'size-medium',
              'L': 'size-large',
              'XL': 'size-xl',
              'XXL': 'size-xxl'
            };
            
            if (sizeValue && sizeMap[sizeValue]) {
              const newLabel = sizeMap[sizeValue];
              
              try {
                // Hent nuværende labels
                const issue = await github.rest.issues.get({
                  owner: owner,
                  repo: repo,
                  issue_number: issueNumber
                });
                
                const currentLabels = issue.data.labels.map(l => l.name);
                
                // Fjern gamle size labels
                const filteredLabels = currentLabels.filter(l => 
                  !l.startsWith('size-')
                );
                
                // Tilføj ny size label
                const allLabels = [...filteredLabels, newLabel];
                
                // Opdater labels
                await github.rest.issues.setLabels({
                  owner: owner,
                  repo: repo,
                  issue_number: issueNumber,
                  labels: allLabels
                });
                
                console.log(`✅ Label "${newLabel}" added to issue #${issueNumber}`);
              } catch (error) {
                console.error('❌ Error updating labels:', error.message);
              }
            } else {
              console.log(`⚠️ Size value not found or not mapped: ${sizeValue}`);
            }
