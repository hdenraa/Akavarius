name: Auto-label issues by size

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  label-by-size:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label by size
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue found');
              return;
            }
            
            const issueNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Processing issue #${issueNumber}`);
            
            try {
              const query = `query {
                repository(owner: "${owner}", name: "${repo}") {
                  issue(number: ${issueNumber}) {
                    projectsV2(first: 5) {
                      nodes {
                        items(first: 50) {
                          nodes {
                            fieldValues(first: 20) {
                              nodes {
                                field { name }
                                ... on ProjectV2FieldSingleSelectValue { name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }`;
              
              const result = await github.graphql(query);
              let size = null;
              
              if (result.repository.issue.projectsV2.nodes[0]) {
                const items = result.repository.issue.projectsV2.nodes[0].items.nodes;
                for (const item of items) {
                  for (const fv of item.fieldValues.nodes) {
                    if (fv.field?.name === 'Size') {
                      size = fv.name;
                    }
                  }
                }
              }
              
              if (!size) {
                console.log('Size not found');
                return;
              }
              
              console.log(`Size: ${size}`);
              
              const sizeToLabel = {
                'XS': 'size-xs',
                'S': 'size-small',
                'M': 'size-medium',
                'L': 'size-large',
                'XL': 'size-xl',
                'XXL': 'size-xxl'
              };
              
              const label = sizeToLabel[size];
              if (!label) return;
              
              const issue = await github.rest.issues.get({
                owner, repo, issue_number: issueNumber
              });
              
              const labels = issue.data.labels.map(l => l.name).filter(l => !l.startsWith('size-'));
              labels.push(label);
              
              await github.rest.issues.setLabels({
                owner, repo, issue_number: issueNumber, labels
              });
              
              console.log(`Added: ${label}`);
            } catch (e) {
              console.error(e.message);
            }
